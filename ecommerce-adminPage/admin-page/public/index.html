<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Store</title>
    <script>
      // Check for dark mode preference
      if (
        localStorage.getItem('darkMode') === 'true' ||
        (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark');
      }
    </script>

    <!-- 🌀 Preloader Styles -->
    <!-- 🌀 Professional Preloader Styles -->
<style>
  #preloader {
    position: fixed;
    inset: 0;
    background-color: #f3f4f6; /* light */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
  }

  .dark #preloader {
    background-color: #0f172a; /* dark */
  }

  .loader {
    width: 150px;
    height: 150px;
    background-color: #3b0a97;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 30px 4px rgba(0, 0, 0, 0.5) inset,
      0 5px 12px rgba(0, 0, 0, 0.15);
    overflow: hidden;
  }
  .loader:before,
  .loader:after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 45%;
    top: -40%;
    background-color: #fff;
    animation: wave 5s linear infinite;
  }
  .loader:before {
    border-radius: 30%;
    background: rgba(255, 255, 255, 0.4);
    animation: wave 5s linear infinite;
  }
  @keyframes wave {
    0% {
      transform: rotate(0);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  .loader-text {
  display: flex;
  gap: 0.1em;
  font-weight: bold;
  font-size: 1.5rem;
  color: #1f2937;
  font-family: monospace;
}

.dark .loader-text {
  color: #d1d5db;
}

.loader-text span {
  opacity: 0;
  animation: fadeChar 1s ease-in-out infinite;
}

.loader-text span:nth-child(1) { animation-delay: 0s; }
.loader-text span:nth-child(2) { animation-delay: 0.1s; }
.loader-text span:nth-child(3) { animation-delay: 0.2s; }
.loader-text span:nth-child(4) { animation-delay: 0.3s; }
.loader-text span:nth-child(5) { animation-delay: 0.4s; }
.loader-text span:nth-child(6) { animation-delay: 0.5s; }
.loader-text span:nth-child(7) { animation-delay: 0.6s; }
.loader-text span:nth-child(8) { animation-delay: 0.7s; }
.loader-text span:nth-child(9) { animation-delay: 0.8s; }
.loader-text span:nth-child(10) { animation-delay: 0.9s; }
.loader-text span:nth-child(11) { animation-delay: 1s; }

@keyframes fadeChar {
  0%, 100% { opacity: 0; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-5px); }
}


  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }
</style>

  </head>

  <body class="h-full bg-gray-100 dark:bg-gray-900">
    <div id="preloader">
      <span class="loader"></span>
      <br>
      <div class="loader-text">
        <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
        <span>&nbsp;</span><span>.</span><span>.</span><span>.</span>
      </div>
      
    </div>
  
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
  
</html>
